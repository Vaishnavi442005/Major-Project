<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - AuraHealth</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
</head>

<body class="bg-gradient-to-br from-[#eff6ff] to-gray-100 min-h-screen flex items-center justify-center">

  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden">

    <!-- Header -->
    <div class="bg-gradient-to-r from-[#2563eb] to-teal-500 text-white text-center py-10">
      <div class="w-16 h-16 mx-auto bg-white/20 rounded-2xl flex items-center justify-center text-2xl mb-4">
        <i class="fa-solid fa-heart-pulse"></i>
      </div>
      <h2 class="text-3xl font-bold">AuraHealth</h2>
      <p class="text-sm opacity-90 mt-2">Your Intelligent Healthcare Companion</p>
    </div>

    <!-- Tabs -->
    <div class="bg-gray-100 p-2 flex rounded-full mx-6 mt-6">
      <a href="signin.html" class="w-1/2 text-gray-500 text-center py-2">Sign In</a>
      <button class="w-1/2 bg-white py-2 rounded-full shadow font-medium">Sign Up</button>
    </div>

    <!-- Form -->
    <div class="p-8">

      <!-- Google -->
      <button class="w-full border rounded-2xl py-3 flex items-center justify-center gap-3 shadow-sm hover:bg-gray-50">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5">
        Continue with Google
      </button>

      <!-- Divider -->
      <div class="flex items-center my-6">
        <div class="flex-1 h-px bg-gray-300"></div>
        <span class="px-3 text-gray-400 text-sm">or</span>
        <div class="flex-1 h-px bg-gray-300"></div>
      </div>

      <form id="signupForm">
        <div class="space-y-5">

          <!-- Name -->
          <div>
            <label class="block text-sm font-medium mb-1">Full Name</label>
            <div class="flex items-center border rounded-2xl px-4 py-3">
              <i class="fa-regular fa-user text-gray-400 mr-3"></i>
              <input type="text" placeholder="Jane Smith" required class="w-full outline-none">
            </div>
          </div>

          <!-- Email -->
          <div>
            <label class="block text-sm font-medium mb-1">Email Address</label>
            <div class="flex items-center border rounded-2xl px-4 py-3">
              <i class="fa-regular fa-envelope text-gray-400 mr-3"></i>
              <input type="email" placeholder="you@example.com" required class="w-full outline-none">
            </div>
          </div>

          <!-- Password -->
          <div>
            <label class="block text-sm font-medium mb-1">Password</label>
            <div class="flex items-center border rounded-2xl px-4 py-3">
              <i class="fa-solid fa-lock text-gray-400 mr-3"></i>
              <input id="password" type="password" placeholder="••••••••" required class="w-full outline-none">
              <i id="togglePassword" class="fa-regular fa-eye text-gray-400 cursor-pointer"></i>
            </div>
          </div>

          <!-- DOB -->
          <div>
            <label class="block text-sm font-medium mb-1">Date of Birth</label>
            <input type="date" required class="w-full px-5 py-3 border rounded-2xl focus:outline-none focus:border-[#2563eb]"/>
          </div>

        </div>

        <!-- Button -->
        <button type="submit" class="mt-6 w-full bg-[#2563eb] text-white py-4 rounded-2xl font-semibold hover:bg-[#1d4ed8]">
          Create Account
        </button>
      </form>

      <p class="text-center mt-6 text-sm">
        Already have an account? 
        <a href="signin.html" class="text-[#2563eb] font-medium">Sign In</a>
      </p>

    </div>

  </div>

  <!-- 🔥 Password Toggle Script -->
  <script>
    const toggle = document.getElementById("togglePassword");
    const password = document.getElementById("password");

    toggle.addEventListener("click", () => {
      const type = password.getAttribute("type") === "password" ? "text" : "password";
      password.setAttribute("type", type);

      toggle.classList.toggle("fa-eye");
      toggle.classList.toggle("fa-eye-slash");
    });
  </script>

</body>
</html>
